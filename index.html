<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="House Clean">
<meta name="theme-color" content="#1a2e1a">
<title>30-Day Clean</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1f0f;
    --surface: #182818;
    --surface2: #1f361f;
    --accent: #7ec87e;
    --accent2: #b8e6b8;
    --gold: #d4a843;
    --text: #e8f0e8;
    --text-muted: #7a9a7a;
    --done-bg: #0d1f0d;
    --done-text: #4a7a4a;
    --radius: 14px;
    --weekend: #2a1f0a;
    --weekend-accent: #d4a843;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  header {
    background: linear-gradient(160deg, #1a3a1a 0%, #0f1f0f 100%);
    padding: 28px 20px 20px;
    border-bottom: 1px solid #2a4a2a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    line-height: 1.2;
    color: var(--accent2);
  }

  h1 em {
    display: block;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }

  .progress-pill {
    background: var(--surface2);
    border: 1px solid #3a5a3a;
    border-radius: 30px;
    padding: 6px 14px;
    font-size: 0.75rem;
    color: var(--accent);
    white-space: nowrap;
    text-align: center;
    min-width: 80px;
  }

  .progress-pill strong {
    display: block;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent2);
  }

  .progress-bar-wrap {
    margin-top: 14px;
    background: #1a2e1a;
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .week-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--gold);
    padding: 24px 20px 10px;
    letter-spacing: 0.03em;
  }

  .week-label span {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 2px;
  }

  .day-card {
    margin: 0 14px 12px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid #253525;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .day-card.weekend {
    background: var(--weekend);
    border-color: #3d2e10;
  }

  .day-card.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent)33;
  }

  .day-card.all-done {
    opacity: 0.6;
    border-color: #1e2e1e;
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px 10px;
    cursor: pointer;
    gap: 10px;
    user-select: none;
  }

  .day-date {
    display: flex;
    flex-direction: column;
  }

  .day-name {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-weight: 500;
  }

  .day-card.weekend .day-name {
    color: var(--gold);
    opacity: 0.8;
  }

  .day-card.today .day-name::after {
    content: ' · TODAY';
    color: var(--accent);
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--text);
    margin-top: 2px;
    line-height: 1.3;
  }

  .day-card.weekend .day-title {
    color: var(--accent2);
  }

  .day-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .time-badge {
    font-size: 0.7rem;
    color: var(--text-muted);
    background: #1a2e1a;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid #2a3e2a;
  }

  .day-card.weekend .time-badge {
    background: #2a1f0a;
    border-color: #3d2e10;
    color: var(--gold);
  }

  .done-count {
    font-size: 0.65rem;
    color: var(--accent);
  }

  .chevron {
    font-size: 0.7rem;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-left: 2px;
  }

  .day-card.open .chevron { transform: rotate(180deg); }

  .task-list {
    display: none;
    padding: 4px 14px 14px;
    border-top: 1px solid #1e2e1e;
  }

  .day-card.weekend .task-list {
    border-top-color: #2a1f0a;
  }

  .day-card.open .task-list { display: block; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid #1a2a1a;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .day-card.weekend .task-item {
    border-bottom-color: #241a08;
  }

  .task-item:last-child { border-bottom: none; }

  .task-item.done { opacity: 0.45; }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #3a5a3a;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.2s;
    background: transparent;
  }

  .day-card.weekend .task-check { border-color: #5a4020; }

  .task-item.done .task-check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .task-item.done .task-check::after {
    content: '✓';
    font-size: 11px;
    color: #0f1f0f;
    font-weight: 700;
  }

  .task-text {
    font-size: 0.9rem;
    line-height: 1.45;
    color: var(--text);
    padding-top: 2px;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--done-text);
  }

  .task-note {
    display: block;
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 2px;
    font-style: italic;
  }

  .emoji-icon {
    font-size: 0.9rem;
  }

  .bonus-tag {
    display: inline-block;
    font-size: 0.6rem;
    background: #2a1f0a;
    color: var(--gold);
    border: 1px solid #3d2e10;
    border-radius: 10px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 20px;
    background: var(--bg);
    border-top: 1px solid #1e2e1e;
    text-align: center;
    font-size: 0.7rem;
    color: var(--text-muted);
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .data-bar {
    margin: 12px 14px 0;
    display: flex;
    gap: 8px;
  }

  .data-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid #3a5a3a;
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    color: var(--accent2);
    cursor: pointer;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background 0.15s, border-color 0.15s;
  }

  .data-btn:active {
    background: #2a4a2a;
    border-color: var(--accent);
  }

  .data-btn .btn-icon { font-size: 1rem; }

  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--accent);
    color: #0f1f0f;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-color-scheme: light) {
    /* keep dark — it's intentional */
  }
</style>
</head>

const STORAGE_KEY = 'cleaning_schedule_v1';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function totalTasks() {
  return DAYS.reduce((s, d) => s + d.tasks.length, 0);
}

function doneTasks() {
  return Object.values(state).filter(Boolean).length;
}

function updateProgress() {
  const pct = Math.round((doneTasks() / totalTasks()) * 100);
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function renderSchedule() {
  const container = document.getElementById('schedule');
  let html = '';
  let lastWeek = '';

  DAYS.forEach((day, di) => {
    if (day.week && day.week !== lastWeek) {
      lastWeek = day.week;
      html += `<div class="week-label"><span>📅 Schedule</span>${day.week}</div>`;
    }

    const allDone = day.tasks.every((_, ti) => state[`${di}-${ti}`]);
    const doneCount = day.tasks.filter((_, ti) => state[`${di}-${ti}`]).length;
    const isOpen = day.today || false;

    html += `<div class="day-card ${day.weekend ? 'weekend' : ''} ${day.today ? 'today' : ''} ${allDone ? 'all-done' : ''} ${isOpen ? 'open' : ''}" id="day-${di}">`;
    html += `<div class="day-header" onclick="toggleDay(${di})">`;
    html += `<div class="day-date">`;
    html += `<span class="day-name">${day.label}, ${day.date}</span>`;
    html += `<span class="day-title">${day.focus}</span>`;
    html += `</div>`;
    html += `<div class="day-meta">`;
    html += `<span class="time-badge">⏱ ${day.time}</span>`;
    html += `<span class="done-count">${doneCount}/${day.tasks.length} done</span>`;
    html += `</div>`;
    html += `<span class="chevron">▼</span>`;
    html += `</div>`;

    html += `<div class="task-list">`;
    day.tasks.forEach((task, ti) => {
      const key = `${di}-${ti}`;
      const done = state[key];
      html += `<div class="task-item ${done ? 'done' : ''}" onclick="toggleTask('${key}', ${di})">`;
      html += `<div class="task-check"></div>`;
      html += `<div class="task-text">${task.text}`;
      if (task.note) html += `<span class="task-note">${task.note}</span>`;
      html += `</div>`;
      html += `</div>`;
    });
    html += `</div>`;
    html += `</div>`;
  });

  container.innerHTML = html;
  updateProgress();
}

function toggleDay(di) {
  const card = document.getElementById(`day-${di}`);
  card.classList.toggle('open');
}

function toggleTask(key, di) {
  state[key] = !state[key];
  saveState(state);

  // Update task UI
  const card = document.getElementById(`day-${di}`);
  const tasks = card.querySelectorAll('.task-item');
  const day = DAYS[di];

  tasks.forEach((el, ti) => {
    const k = `${di}-${ti}`;
    el.classList.toggle('done', !!state[k]);
  });

  // Update done count
  const doneCount = day.tasks.filter((_, ti) => state[`${di}-${ti}`]).length;
  card.querySelector('.done-count').textContent = `${doneCount}/${day.tasks.length} done`;

  const allDone = doneCount === day.tasks.length;
  card.classList.toggle('all-done', allDone);

  updateProgress();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportProgress() {
  const data = JSON.stringify(state);
  const encoded = btoa(data);
  // Build a tiny text file with the backup code
  const blob = new Blob([encoded], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cleaning-progress-backup.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Progress exported!');
}

function importProgress() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt,text/plain';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const decoded = atob(ev.target.result.trim());
        const imported = JSON.parse(decoded);
        state = imported;
        saveState(state);
        renderSchedule();
        showToast('✓ Progress restored!');
      } catch {
        showToast('⚠️ Could not read that file');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

renderSchedule();
</script>
</body>
</html>
